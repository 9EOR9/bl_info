<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schach Bundesliga Endrunde - Slide 1 Final Arched</title>
    <style>
    @font-face {
            font-family: 'Roboto Condensed';
            src: url('fonts/RobotoCondensed-VariableFont_wght.ttf') format('truetype-variations'),
                 url('fonts/RobotoCondensed-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        @font-face {
            font-family: 'Roboto Condensed';
            src: url('fonts/RobotoCondensed-Italic-VariableFont_wght.ttf') format('truetype-variations'),
                 url('fonts/RobotoCondensed-Italic-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: italic;
        }

        :root {
            --wbh-overlay: rgba(10, 10, 10, 0.9);
            --gold: #c5a059;
            --header-white: #ffffff;
            --headline-width: 1750px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(var(--wbh-overlay), var(--wbh-overlay)), url('img/wbh.jpg') center/cover no-repeat;
            width: 2160px; 
            height: 3840px;
            overflow: hidden;
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* --- HEADER OBEN --- */
        .header-bar {
            width: 100%; 
            background: var(--header-white);
            padding: 90px 0; 
            text-align: center;
            border-bottom: 20px solid var(--gold);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            z-index: 100;
        }

        .header-bar h1 { 
            color: #000000;
            font-size: 150px; 
            text-transform: uppercase; 
            letter-spacing: 12px;
            line-height: 1.1;
        }

        .header-bar h2 { 
            color: #000000;
            font-size: 100px; 
            text-transform: uppercase;
            margin-top: 20px;
            font-weight: 300;
        }

        /* --- FOOTER-BOX UNTEN (UKA) --- */
        .footer-bar {
            width: 100%; 
            background: var(--header-white);
            padding: 60px 0; 
            text-align: center;
            border-top: 20px solid var(--gold); /* Goldener Streifen OBEN */
            box-shadow: 0 -15px 50px rgba(0,0,0,0.6);
            margin-top: auto; /* Schiebt die Box ganz nach unten */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-uka-footer {
            height: 300px; 
            width: auto;
            object-fit: contain;
        }

        /* Reduzierter Spacer, um Inhalt nach oben zu schieben */
        .top-spacer {
            height: 150px; 
            width: 100%;
        }

        .main-content {
            flex-grow: 1; 
            width: 100%; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }

        /* Spieler-Reihen mit Biegung */
        .player-row {
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            width: 100%;
            margin: 40px 0;
            position: relative;
        }

        .row-top div:nth-child(1), .row-top div:nth-child(5) { transform: translateY(80px); }
        .row-top div:nth-child(2), .row-top div:nth-child(4) { transform: translateY(40px); }
        .row-bottom div:nth-child(1), .row-bottom div:nth-child(5) { transform: translateY(-80px); }
        .row-bottom div:nth-child(2), .row-bottom div:nth-child(4) { transform: translateY(-40px); }

        .player-circle {
            width: 150px; 
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            background: #1a1a1a;
            position: relative;
        }

        .player-circle img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            object-position: center 15%;
            position: absolute;
            top: 0; left: 0;
            transition: opacity 1.8s ease-in-out;
            opacity: 0;
        }

        .player-circle img.active { opacity: 1; }

        .headline-group { 
            text-align: center; 
            margin: 100px 0; 
            width: var(--headline-width);
        }
        
        .weltklasse {
            font-size: 210px; font-weight: 700; text-transform: uppercase;
            color: var(--gold); letter-spacing: 20px; line-height: 1.0;
            text-shadow: 0 15px 45px #000; margin-bottom: 10px;
        }

        .willkommen-sektion {
            margin-top: 100px; 
            text-align: center;
            border-top: 6px solid var(--gold);
            border-bottom: 6px solid var(--gold);
            padding: 70px 0;
            width: 1600px;
        }

        .willkommen-text {
            font-size: 110px; color: #fff; font-weight: 300; line-height: 1.3;
            text-shadow: 0 5px 15px #000;
        }

        .willkommen-text b { font-weight: 700; }
        .datum-text { font-size: 130px; font-weight: 700; color: #fff; margin-top: 30px; display: block; }

    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Schachbundesliga<br>Zentrale Endrunde</h1>
        <h2>Berlin 2026</h2> 
    </div>

    <div class="top-spacer"></div>

    <div class="main-content">
        
        <div class="player-row row-top">
            <div class="player-circle" id="c1"></div>
            <div class="player-circle" id="c2"></div>
            <div class="player-circle" id="c3"></div>
            <div class="player-circle" id="c4"></div>
            <div class="player-circle" id="c5"></div>
        </div>

        <div class="headline-group">
            <h2 class="weltklasse">Die Weltklasse<br>zu Gast in Berlin</h2>
        </div>

        <div class="player-row row-bottom">
            <div class="player-circle" id="c6"></div>
            <div class="player-circle" id="c7"></div>
            <div class="player-circle" id="c8"></div>
            <div class="player-circle" id="c9"></div>
            <div class="player-circle" id="c10"></div>
        </div>

        <div class="willkommen-sektion">
            <p class="willkommen-text">
                Willkommen zur zentralen<br>
                <b>Schachbundesliga Endrunde</b><br>
                <span class="datum-text">24. – 26. April 2026</span>
            </p>
        </div>

    </div>

    <div class="footer-bar">
        <img src="img/UKA_Logo.png" class="logo-uka-footer" alt="UKA Logo">
    </div>

    <script>
        const playerPool = [
            "20170719-wladimir_fedoseev_3.webp", "duda.webp", "indjic.webp", "martirosyan rosen.webp", "nguyen.webp", "svane fred dsb.webp",
            "abdusattorov ootes1.webp", "eljanov shotourman fide2.webp", "jacek_tomczak_0.webp", "mateusz_bartel_2.webp", "nielsen_0.webp", "theodorou.webp",
            "anand riga.webp", "emil_schmidek_0.webp", "kamsky.webp", "matthias_bluebaum_3.webp", "Nils Grandelius.webp", "van wely kniest.webp",
            "andre_volokitin_2.webp", "erigaisi.webp", "keymer.webp", "murzin_0.webp", "pavlidis.webp",
            "bjerre bonhage.webp", "fabiano-caruana.webp", "livaic schmidt.webp", "mvl.webp", "pentala_harikrishna.webp",
            "bologan_0.webp", "firouzja walusza thumb.webp", "livie-dieter_nisipeanu.webp", "navara.webp", "ponomariov.webp",
            "carlsen ootes fide3.webp", "giri werner.webp", "luke_mcshane_1.webp", "neiksans_arturs_1.webp", "SCV_Shakhriyar-Mamedyarov.webp"
        ];

        let currentQueue = [];

        function getNextPlayers(count) {
            let selected = [];
            for (let i = 0; i < count; i++) {
                if (currentQueue.length === 0) {
                    currentQueue = [...playerPool].sort(() => Math.random() - 0.5);
                }
                selected.push(currentQueue.shift());
            }
            return selected;
        }

        function updateDisplay() {
            const nextSet = getNextPlayers(10);
            for (let i = 1; i <= 10; i++) {
                const container = document.getElementById('c' + i);
                const oldImg = container.querySelector('img.active');
                const newImg = document.createElement('img');
                newImg.src = "img/players/" + nextSet[i-1];
                container.appendChild(newImg);
                setTimeout(() => {
                    newImg.classList.add('active');
                    if (oldImg) {
                        oldImg.classList.remove('active');
                        setTimeout(() => {
                            if (oldImg.parentNode === container) {
                                container.removeChild(oldImg);
                            }
                        }, 2000);
                    }
                }, 100);
            }
        }

        updateDisplay();
        setInterval(updateDisplay, 10000);
    </script>
</body>
</html>
